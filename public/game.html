<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Путь к хайпу</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family:sans-serif;
text-align:center;
margin:0;
}

#game{
position:relative;
width:800px;
margin:auto;
}

#board{
width:800px;
}

.chip{
position:absolute;
width:28px;
height:28px;
border-radius:50%;
border:2px solid white;
transform:translate(-50%,-50%);
}

#diceBtn{
font-size:20px;
padding:12px;
margin-top:10px;
}

#diceResult{
font-size:22px;
margin:10px;
}

#hypeBar{
width:400px;
height:20px;
background:#ddd;
margin:auto;
}

#hypeFill{
height:100%;
width:0%;
background:red;
}

#message{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🔥 Путь к хайпу</h1>

<div id="hypeBar">
<div id="hypeFill"></div>
</div>

<div id="diceResult"></div>

<div id="game">

<img id="board" src="board.jpg">

<div id="chip" class="chip"></div>

</div>

<button id="diceBtn">БРОСИТЬ КУБИК</button>

<div id="message"></div>

<script src="game.js"></script>

</body>
</html>

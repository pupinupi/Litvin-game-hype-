<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🔥 Путь к хайпу</h1>

<div id="player"></div>
<div id="status">Ваш ход</div>

<div id="hypeBar">
<div id="hypeValue">Хайп: 0</div>
<div id="hypeScale">
<div id="hypeFill"></div>
</div>
</div>

<div id="board">

<img id="boardImg" src="board.jpg">

<div id="chip"></div>

<div id="diceResult"></div>

</div>

<button id="diceBtn">🎲 Бросить кубик</button>

<div id="hypeLog"></div>

<div id="riskWindow" class="popup"></div>

<div id="ruleWindow" class="popup"></div>

<div id="scandalCard" class="card">
<div class="cardTitle">🔥 Скандал</div>
<div id="scandalText"></div>
</div>

<div id="winScreen">

<h1>🏆 Победа!</h1>

<p id="winnerText"></p>

<button onclick="location.reload()">Играть снова</button>

</div>

<script src="game.js"></script>

</body>
</html>
